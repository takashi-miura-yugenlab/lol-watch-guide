<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>LoL 観戦ガイド</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>LoL 観戦ガイド</h1>

  <section class="selectors">
    <div>
      <h2>BLUE TEAM</h2>
      <div id="blueSelectors"></div>
    </div>

    <div>
      <h2>RED TEAM</h2>
      <div id="redSelectors"></div>
    </div>
  </section>

  <main class="board">
    <section class="team blue">
      <h2>BLUE TEAM</h2>
      <div id="blueTeam"></div>
    </section>

    <section class="team red">
      <h2>RED TEAM</h2>
      <div id="redTeam"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
